<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>LiveText Chat - See Messages as They're Typed</title>
    <!-- Google Fonts & Font Awesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Main App Container */
      .app-container {
        width: 100%;
        max-width: 1400px;
        height: 90vh;
        background: white;
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* Sidebar */
      .sidebar {
        width: 320px;
        background: #f8fafc;
        border-right: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Main Chat Area */
      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #ffffff;
      }

      /* Auth Forms */
      .auth-container {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .auth-card {
        background: white;
        padding: 40px;
        border-radius: 32px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .auth-card h2 {
        font-size: 28px;
        margin-bottom: 8px;
        color: #1e293b;
      }

      .auth-card p {
        color: #64748b;
        margin-bottom: 32px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #334155;
      }

      .input-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.2s;
      }

      .input-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .toggle-auth {
        text-align: center;
        margin-top: 20px;
        color: #64748b;
      }

      .toggle-auth a {
        color: #667eea;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
      }

      /* User Profile Header */
      .user-profile {
        padding: 24px;
        background: white;
        border-bottom: 1px solid #e2e8f0;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 18px;
      }

      .user-details h3 {
        font-size: 16px;
        margin-bottom: 4px;
      }

      .user-details p {
        font-size: 12px;
        color: #64748b;
      }

      .logout-btn {
        margin-left: auto;
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        font-size: 20px;
        padding: 8px;
      }

      /* Users List */
      .users-list {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 12px;
        text-transform: uppercase;
      }

      .user-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s;
        margin-bottom: 4px;
      }

      .user-item:hover {
        background: #f1f5f9;
      }

      .user-item.active {
        background: #eef2ff;
      }

      .user-avatar-small {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #cbd5e1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        position: relative;
      }

      .online-status {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        position: absolute;
        bottom: 2px;
        right: 2px;
        border: 2px solid white;
      }

      .online-status.online {
        background: #10b981;
      }

      .online-status.offline {
        background: #94a3b8;
      }

      .user-name {
        flex: 1;
        font-weight: 500;
      }

      .user-email {
        font-size: 11px;
        color: #64748b;
      }

      /* Chat Header */
      .chat-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e2e8f0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .chat-header-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chat-header h3 {
        font-size: 18px;
        font-weight: 600;
      }

      /* Live Typing Preview */
      .live-preview {
        background: #fef3c7;
        border-left: 4px solid #f59e0b;
        padding: 12px 16px;
        margin: 0 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideDown 0.3s ease;
      }

      .live-preview i {
        color: #f59e0b;
        font-size: 20px;
      }

      .live-preview-content {
        flex: 1;
      }

      .live-preview-name {
        font-weight: 600;
        font-size: 12px;
        color: #92400e;
        margin-bottom: 4px;
      }

      .live-preview-text {
        font-size: 14px;
        color: #78350f;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .cursor-blink {
        display: inline-block;
        width: 2px;
        height: 18px;
        background-color: #f59e0b;
        animation: blink 1s infinite;
        margin-left: 2px;
        vertical-align: middle;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Messages Area */
      .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: #faf9fe;
      }

      .message {
        display: flex;
        max-width: 70%;
        animation: fadeIn 0.3s ease;
      }

      .message.sent {
        align-self: flex-end;
        justify-content: flex-end;
      }

      .message.received {
        align-self: flex-start;
      }

      .message-bubble {
        padding: 10px 16px;
        border-radius: 18px;
        word-wrap: break-word;
        max-width: 100%;
      }

      .sent .message-bubble {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .received .message-bubble {
        background: white;
        border: 1px solid #e2e8f0;
        color: #1e293b;
        border-bottom-left-radius: 4px;
      }

      .message-meta {
        font-size: 11px;
        margin-top: 4px;
        opacity: 0.7;
        display: flex;
        gap: 8px;
      }

      .sent .message-meta {
        justify-content: flex-end;
      }

      /* Message Input */
      .message-input {
        padding: 20px 24px;
        border-top: 1px solid #e2e8f0;
        background: white;
      }

      .input-wrapper {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      .input-container {
        flex: 1;
        position: relative;
      }

      .message-input textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 24px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        outline: none;
        resize: none;
        max-height: 100px;
        transition: all 0.2s;
      }

      .message-input textarea:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .char-count {
        position: absolute;
        bottom: 8px;
        right: 12px;
        font-size: 10px;
        color: #94a3b8;
        background: white;
        padding: 2px 6px;
        border-radius: 12px;
      }

      .message-input button {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .message-input button:hover {
        transform: scale(1.05);
      }

      .message-input button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .empty-chat {
        text-align: center;
        color: #94a3b8;
        margin-top: 50px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Typing indicator (subtle) */
      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        background: #f1f5f9;
        border-radius: 16px;
        width: fit-content;
        font-size: 12px;
        color: #64748b;
      }

      .typing-dot {
        width: 4px;
        height: 4px;
        background: #94a3b8;
        border-radius: 50%;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/javascript">
      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCbMqMqWxYxZxXxXxXxXxXxXxXxXxXxXx",
        authDomain: "teamchat-demo.firebaseapp.com",
        projectId: "teamchat-demo",
        storageBucket: "teamchat-demo.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef1234567890",
      };

      // IMPORTANT: Replace with your actual Firebase config from console.firebase.google.com

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      db.enablePersistence().catch((err) => console.log(err));
    </script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const ChatApp = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [users, setUsers] = useState([]);
        const [selectedUser, setSelectedUser] = useState(null);
        const [messages, setMessages] = useState([]);
        const [messageText, setMessageText] = useState("");
        const [liveText, setLiveText] = useState(""); // Real-time text being typed by opponent
        const [isAuthMode, setIsAuthMode] = useState("login");
        const [authEmail, setAuthEmail] = useState("");
        const [authPassword, setAuthPassword] = useState("");
        const messagesEndRef = useRef(null);
        const textareaRef = useRef(null);
        const typingTimeoutRef = useRef(null);

        // Check auth state
        useEffect(() => {
          const unsubscribe = auth.onAuthStateChanged(async (user) => {
            if (user) {
              setUser(user);
              await db
                .collection("users")
                .doc(user.uid)
                .set(
                  {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.email.split("@")[0],
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                  },
                  { merge: true }
                );

              // Set up presence
              const presenceRef = db.collection("presence").doc(user.uid);
              presenceRef.set({
                online: true,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
              });

              window.addEventListener("beforeunload", () => {
                presenceRef.set({ online: false });
                db.collection("users").doc(user.uid).update({ online: false });
              });
            }
            setLoading(false);
          });
          return () => unsubscribe();
        }, []);

        // Load all users
        useEffect(() => {
          if (!user) return;

          const unsubscribe = db.collection("users").onSnapshot((snapshot) => {
            const userList = [];
            snapshot.forEach((doc) => {
              if (doc.id !== user.uid) {
                userList.push({ uid: doc.id, ...doc.data() });
              }
            });
            setUsers(userList);
          });

          return () => unsubscribe();
        }, [user]);

        // Load messages
        useEffect(() => {
          if (!user || !selectedUser) return;

          const chatId = [user.uid, selectedUser.uid].sort().join("_");
          const unsubscribe = db
            .collection("chats")
            .doc(chatId)
            .collection("messages")
            .orderBy("timestamp", "asc")
            .onSnapshot((snapshot) => {
              const msgs = [];
              snapshot.forEach((doc) => {
                msgs.push({ id: doc.id, ...doc.data() });
              });
              setMessages(msgs);
              scrollToBottom();
            });

          return () => unsubscribe();
        }, [user, selectedUser]);

        // Listen for live text being typed by the selected user
        useEffect(() => {
          if (!user || !selectedUser) return;

          const chatId = [user.uid, selectedUser.uid].sort().join("_");
          const liveTextRef = db.collection("liveText").doc(chatId);

          const unsubscribe = liveTextRef.onSnapshot((doc) => {
            if (doc.exists) {
              const data = doc.data();
              // Only show if it's not from current user and text exists
              if (data.userId !== user.uid && data.text) {
                setLiveText(data.text);
              } else if (data.userId !== user.uid && !data.text) {
                setLiveText("");
              }
            } else {
              setLiveText("");
            }
          });

          return () => unsubscribe();
        }, [user, selectedUser]);

        const scrollToBottom = () => {
          messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        };

        // Send live text as user types (debounced)
        const handleLiveTyping = (text) => {
          setMessageText(text);

          // Clear previous timeout
          if (typingTimeoutRef.current) {
            clearTimeout(typingTimeoutRef.current);
          }

          if (!selectedUser) return;

          const chatId = [user.uid, selectedUser.uid].sort().join("_");
          const liveTextRef = db.collection("liveText").doc(chatId);

          // Send live text to Firestore
          if (text.trim()) {
            liveTextRef.set({
              userId: user.uid,
              text: text,
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            });
          } else {
            liveTextRef.set({
              userId: user.uid,
              text: "",
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            });
          }

          // Clear live text after 2 seconds of no typing
          typingTimeoutRef.current = setTimeout(() => {
            liveTextRef.set({
              userId: user.uid,
              text: "",
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            });
          }, 2000);
        };

        const sendMessage = async () => {
          if (!messageText.trim() || !selectedUser) return;

          const chatId = [user.uid, selectedUser.uid].sort().join("_");

          // Send the message
          await db.collection("chats").doc(chatId).collection("messages").add({
            text: messageText,
            senderId: user.uid,
            receiverId: selectedUser.uid,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            read: false,
          });

          // Clear live text after sending
          const liveTextRef = db.collection("liveText").doc(chatId);
          await liveTextRef.set({
            userId: user.uid,
            text: "",
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          });

          setMessageText("");

          // Auto-focus textarea
          textareaRef.current?.focus();
        };

        const handleKeyPress = (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        };

        const handleAuth = async () => {
          try {
            if (isAuthMode === "login") {
              await auth.signInWithEmailAndPassword(authEmail, authPassword);
            } else {
              await auth.createUserWithEmailAndPassword(
                authEmail,
                authPassword
              );
            }
          } catch (error) {
            alert(error.message);
          }
        };

        const handleLogout = async () => {
          if (user) {
            await db.collection("users").doc(user.uid).update({
              online: false,
              lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
            });
          }
          await auth.signOut();
          setUser(null);
          setSelectedUser(null);
          setLiveText("");
        };

        if (loading) {
          return (
            <div
              className="app-container"
              style={{ justifyContent: "center", alignItems: "center" }}
            >
              <div>Loading...</div>
            </div>
          );
        }

        if (!user) {
          return (
            <div className="app-container">
              <div className="auth-container">
                <div className="auth-card">
                  <h2>
                    {isAuthMode === "login"
                      ? "Welcome Back!"
                      : "Create Account"}
                  </h2>
                  <p>
                    {isAuthMode === "login"
                      ? "Sign in to chat with colleagues"
                      : "Join TeamChat and collaborate"}
                  </p>

                  <div className="input-group">
                    <label>Email Address</label>
                    <input
                      type="email"
                      placeholder="colleague@company.com"
                      value={authEmail}
                      onChange={(e) => setAuthEmail(e.target.value)}
                    />
                  </div>

                  <div className="input-group">
                    <label>Password</label>
                    <input
                      type="password"
                      placeholder="••••••••"
                      value={authPassword}
                      onChange={(e) => setAuthPassword(e.target.value)}
                    />
                  </div>

                  <button className="btn" onClick={handleAuth}>
                    {isAuthMode === "login" ? "Sign In" : "Sign Up"}
                  </button>

                  <div className="toggle-auth">
                    {isAuthMode === "login" ? (
                      <>
                        Don't have an account?{" "}
                        <a onClick={() => setIsAuthMode("signup")}>Sign up</a>
                      </>
                    ) : (
                      <>
                        Already have an account?{" "}
                        <a onClick={() => setIsAuthMode("login")}>Sign in</a>
                      </>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="app-container">
            {/* Sidebar */}
            <div className="sidebar">
              <div className="user-profile">
                <div className="user-info">
                  <div className="avatar">{user.email?.[0].toUpperCase()}</div>
                  <div className="user-details">
                    <h3>{user.email?.split("@")[0]}</h3>
                    <p>{user.email}</p>
                  </div>
                  <button className="logout-btn" onClick={handleLogout}>
                    <i className="fas fa-sign-out-alt"></i>
                  </button>
                </div>
              </div>

              <div className="users-list">
                <div className="section-title">
                  <i className="fas fa-users"></i> Colleagues ({users.length})
                </div>
                {users.map((u) => (
                  <div
                    key={u.uid}
                    className={`user-item ${
                      selectedUser?.uid === u.uid ? "active" : ""
                    }`}
                    onClick={() => setSelectedUser(u)}
                  >
                    <div className="user-avatar-small">
                      {u.displayName?.[0]?.toUpperCase() || "U"}
                      <span
                        className={`online-status ${
                          u.online ? "online" : "offline"
                        }`}
                      ></span>
                    </div>
                    <div className="user-name">
                      {u.displayName}
                      <div className="user-email">{u.email}</div>
                    </div>
                  </div>
                ))}
                {users.length === 0 && (
                  <div
                    style={{
                      textAlign: "center",
                      color: "#94a3b8",
                      padding: "20px",
                    }}
                  >
                    No colleagues online yet
                  </div>
                )}
              </div>
            </div>

            {/* Chat Area */}
            <div className="chat-area">
              {selectedUser ? (
                <>
                  <div className="chat-header">
                    <div className="chat-header-info">
                      <div
                        className="user-avatar-small"
                        style={{ width: "48px", height: "48px" }}
                      >
                        {selectedUser.displayName?.[0]?.toUpperCase() || "U"}
                        <span
                          className={`online-status ${
                            selectedUser.online ? "online" : "offline"
                          }`}
                        ></span>
                      </div>
                      <div>
                        <h3>{selectedUser.displayName}</h3>
                        <div style={{ fontSize: "12px", color: "#64748b" }}>
                          {selectedUser.online ? "Online" : "Offline"}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Live Text Preview - Shows what opponent is typing in real-time */}
                  {liveText && (
                    <div className="live-preview">
                      <i className="fas fa-pencil-alt"></i>
                      <div className="live-preview-content">
                        <div className="live-preview-name">
                          {selectedUser.displayName} is writing:
                        </div>
                        <div className="live-preview-text">
                          {liveText}
                          <span className="cursor-blink"></span>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Messages Area */}
                  <div className="messages-area">
                    {messages.map((msg) => (
                      <div
                        key={msg.id}
                        className={`message ${
                          msg.senderId === user.uid ? "sent" : "received"
                        }`}
                      >
                        <div className="message-bubble">
                          {msg.text}
                          <div className="message-meta">
                            <span>
                              {msg.timestamp?.toDate?.().toLocaleTimeString() ||
                                "Just now"}
                            </span>
                          </div>
                        </div>
                      </div>
                    ))}
                    <div ref={messagesEndRef} />
                  </div>

                  {/* Message Input */}
                  <div className="message-input">
                    <div className="input-wrapper">
                      <div className="input-container">
                        <textarea
                          ref={textareaRef}
                          rows="1"
                          placeholder={`Message ${selectedUser.displayName}...`}
                          value={messageText}
                          onChange={(e) => handleLiveTyping(e.target.value)}
                          onKeyDown={handleKeyPress}
                          style={{ paddingRight: "50px" }}
                        />
                        <div className="char-count">
                          {messageText.length}/500
                        </div>
                      </div>
                      <button
                        onClick={sendMessage}
                        disabled={!messageText.trim()}
                      >
                        <i className="fas fa-paper-plane"></i>
                      </button>
                    </div>
                  </div>
                </>
              ) : (
                <div
                  style={{
                    flex: 1,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                  }}
                >
                  <div className="empty-chat">
                    <i
                      className="fas fa-comments"
                      style={{
                        fontSize: "48px",
                        marginBottom: "16px",
                        opacity: 0.5,
                      }}
                    ></i>
                    <h3>Select a colleague to start chatting</h3>
                    <p>Click on any user from the sidebar to begin</p>
                    <p
                      style={{
                        fontSize: "12px",
                        marginTop: "8px",
                        color: "#f59e0b",
                      }}
                    >
                      <i className="fas fa-eye"></i> See what they're typing in
                      real-time!
                    </p>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      ReactDOM.render(<ChatApp />, document.getElementById("root"));
    </script>
  </body>
</html>
