<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamChat - Real-time Messaging</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        .auth-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .auth-card h2 { font-size: 28px; margin-bottom: 8px; color: #1e293b; }
        .auth-card p { color: #64748b; margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #334155; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); }
        .toggle-auth { text-align: center; margin-top: 20px; color: #64748b; }
        .toggle-auth a { color: #667eea; cursor: pointer; font-weight: 600; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .user-profile { padding: 24px; background: white; border-bottom: 1px solid #e2e8f0; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .user-details h3 { font-size: 16px; margin-bottom: 4px; }
        .user-details p { font-size: 12px; color: #64748b; }
        .logout-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 20px;
        }
        .users-list { flex: 1; overflow-y: auto; padding: 16px; }
        .section-title { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 12px; text-transform: uppercase; }
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        .user-item:hover { background: #f1f5f9; }
        .user-item.active { background: #eef2ff; border-left: 3px solid #667eea; }
        .user-avatar-small {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
        }
        .online-status {
            width: 10px; height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 2px; right: 2px;
            border: 2px solid white;
        }
        .online-status.online { background: #10b981; }
        .online-status.offline { background: #94a3b8; }
        .user-name { flex: 1; font-weight: 500; }
        .user-email { font-size: 11px; color: #64748b; margin-top: 2px; }
        .chat-header { padding: 20px 24px; border-bottom: 1px solid #e2e8f0; background: white; }
        .chat-header-info { display: flex; align-items: center; gap: 12px; }
        .chat-header h3 { font-size: 18px; font-weight: 600; }
        .live-preview {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px 16px;
            margin: 12px 20px 0 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #faf9fe;
        }
        .message { display: flex; max-width: 70%; }
        .message.sent { align-self: flex-end; justify-content: flex-end; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: 10px 16px; border-radius: 18px; word-wrap: break-word; }
        .sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .received .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .message-meta { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .message-input { padding: 20px 24px; border-top: 1px solid #e2e8f0; background: white; }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .input-container { flex: 1; position: relative; }
        .message-input textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            resize: none;
        }
        .message-input textarea:focus { border-color: #667eea; }
        .message-input button {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
        }
        .empty-chat { text-align: center; color: #94a3b8; margin-top: 50px; }
        .empty-chat i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .loading-spinner { text-align: center; padding: 20px; }
        @media (max-width: 768px) { .sidebar { width: 280px; } .message { max-width: 85%; } }
    </style>
</head>
<body>
<div id="root"><div class="loading-spinner">Loading TeamChat...</div></div>

<script type="text/babel">
    // ============================================
    // 🔧 IMPORTANT: REPLACE WITH YOUR FIREBASE CONFIG
    // Get it from: https://console.firebase.google.com/project/_/settings/general/
    // ============================================
    const firebaseConfig = {
       apiKey: "AIzaSyD5u0_bPryTrnF7BA5g_2cuE-MN82MW7QI",
  authDomain: "realtime-chatapp-da275.firebaseapp.com",
  projectId: "realtime-chatapp-da275",
  storageBucket: "realtime-chatapp-da275.firebasestorage.app",
  messagingSenderId: "741973944332",
  appId: "1:741973944332:web:263b94797c9cffefd8a629",
  measurementId: "G-H52XY4379T"
    };
    
    // Check if Firebase is configured
    const isFirebaseConfigured = firebaseConfig.apiKey !== "AIzaSyD5u0_bPryTrnF7BA5g_2cuE-MN82MW7QI" && 
                                  firebaseConfig.projectId !== "realtime-chatapp-da275";
    
    if (!isFirebaseConfigured) {
        document.getElementById('root').innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: white; padding: 20px;">
                <div style="text-align: center; max-width: 500px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #f59e0b; margin-bottom: 20px;"></i>
                    <h2 style="color: #1e293b;">⚠️ Firebase Configuration Required</h2>
                    <p style="color: #64748b; margin: 20px 0;">Please replace the firebaseConfig object above with your actual Firebase project configuration.</p>
                    <div style="background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: left;">
                        <strong>📋 Get your config:</strong>
                        <ol style="margin-top: 10px; margin-left: 20px;">
                            <li>Go to <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a></li>
                            <li>Click the web icon (&lt;/&gt;) to add a web app</li>
                            <li>Copy the firebaseConfig object</li>
                            <li>Paste it above, replacing the placeholders</li>
                        </ol>
                    </div>
                </div>
            </div>
        `;
        throw new Error("Firebase not configured. Please replace the firebaseConfig object.");
    }
    
    // Initialize Firebase
    let auth, db;
    try {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        console.log("✅ Firebase initialized");
    } catch (error) {
        console.error("Firebase error:", error);
        document.getElementById('root').innerHTML = `<div style="padding:20px;text-align:center;color:red;">Firebase Error: ${error.message}</div>`;
        throw error;
    }
    
    const { useState, useEffect, useRef } = React;
    
    const ChatApp = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [users, setUsers] = useState([]);
        const [selectedUser, setSelectedUser] = useState(null);
        const [messages, setMessages] = useState([]);
        const [messageText, setMessageText] = useState('');
        const [liveText, setLiveText] = useState('');
        const [isAuthMode, setIsAuthMode] = useState('login');
        const [authEmail, setAuthEmail] = useState('');
        const [authPassword, setAuthPassword] = useState('');
        const [authError, setAuthError] = useState('');
        const [sending, setSending] = useState(false);
        const messagesEndRef = useRef(null);
        const textareaRef = useRef(null);
        const typingTimeoutRef = useRef(null);
        
        const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        useEffect(() => { scrollToBottom(); }, [messages]);
        
        // Auth state
        useEffect(() => {
            if (!auth) return;
            const unsubscribe = auth.onAuthStateChanged(async (authUser) => {
                if (authUser) {
                    setUser(authUser);
                    try {
                        await db.collection('users').doc(authUser.uid).set({
                            uid: authUser.uid,
                            email: authUser.email,
                            displayName: authUser.email.split('@')[0],
                            online: true,
                            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    } catch (err) { console.error(err); }
                } else {
                    setUser(null);
                    setSelectedUser(null);
                }
                setLoading(false);
            });
            return () => unsubscribe();
        }, []);
        
        // Load users
        useEffect(() => {
            if (!user || !db) return;
            return db.collection('users').orderBy('online', 'desc').onSnapshot(snapshot => {
                const list = [];
                snapshot.forEach(doc => { if (doc.id !== user.uid) list.push({ uid: doc.id, ...doc.data() }); });
                setUsers(list);
            });
        }, [user]);
        
        // Load messages
        useEffect(() => {
            if (!user || !selectedUser || !db) return;
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            return db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    const msgs = [];
                    snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
                    setMessages(msgs);
                });
        }, [user, selectedUser]);
        
        // Live typing listener
        useEffect(() => {
            if (!user || !selectedUser || !db) return;
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            return db.collection('liveText').doc(chatId).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.userId !== user.uid && data.text?.trim()) setLiveText(data.text);
                    else setLiveText('');
                } else setLiveText('');
            });
        }, [user, selectedUser]);
        
        const handleLiveTyping = (text) => {
            setMessageText(text);
            if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
            if (!selectedUser || !db) return;
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            const liveRef = db.collection('liveText').doc(chatId);
            liveRef.set({ userId: user.uid, text: text, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            typingTimeoutRef.current = setTimeout(() => {
                liveRef.set({ userId: user.uid, text: '', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            }, 2000);
        };
        
        const sendMessage = async () => {
            if (!messageText.trim() || !selectedUser || sending || !db) return;
            setSending(true);
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            try {
                await db.collection('chats').doc(chatId).collection('messages').add({
                    text: messageText, senderId: user.uid, receiverId: selectedUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), read: false
                });
                await db.collection('liveText').doc(chatId).set({ userId: user.uid, text: '' });
                setMessageText('');
                textareaRef.current?.focus();
            } catch (err) { console.error(err); }
            finally { setSending(false); }
        };
        
        const handleAuth = async () => {
            setAuthError('');
            if (!authEmail || !authPassword) { setAuthError("Please enter email and password"); return; }
            try {
                if (isAuthMode === 'login') await auth.signInWithEmailAndPassword(authEmail, authPassword);
                else await auth.createUserWithEmailAndPassword(authEmail, authPassword);
            } catch (error) {
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') msg = "Email already registered. Sign in instead.";
                else if (error.code === 'auth/weak-password') msg = "Password must be at least 6 characters.";
                setAuthError(msg);
            }
        };
        
        const handleLogout = async () => {
            if (user && db) await db.collection('users').doc(user.uid).update({ online: false });
            await auth.signOut();
            setUser(null);
            setSelectedUser(null);
        };
        
        const handleKeyPress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
        if (loading) return <div className="app-container" style={{justifyContent:'center',alignItems:'center'}}><div className="loading-spinner">Loading...</div></div>;
        
        if (!user) {
            return (
                <div className="app-container">
                    <div className="auth-container">
                        <div className="auth-card">
                            <h2>{isAuthMode === 'login' ? 'Welcome Back!' : 'Create Account'}</h2>
                            <p>{isAuthMode === 'login' ? 'Sign in to chat' : 'Join TeamChat'}</p>
                            {authError && <div className="error-message">{authError}</div>}
                            <div className="input-group"><label>Email</label><input type="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} /></div>
                            <div className="input-group"><label>Password</label><input type="password" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleAuth()} /></div>
                            <button className="btn" onClick={handleAuth}>{isAuthMode==='login'?'Sign In':'Sign Up'}</button>
                            <div className="toggle-auth">{isAuthMode==='login'?<>No account? <a onClick={()=>setIsAuthMode('signup')}>Sign up</a></>:<>Have an account? <a onClick={()=>setIsAuthMode('login')}>Sign in</a></>}</div>
                        </div>
                    </div>
                </div>
            );
        }
        
        return (
            <div className="app-container">
                <div className="sidebar">
                    <div className="user-profile"><div className="user-info"><div className="avatar">{user.email?.[0]?.toUpperCase()}</div><div className="user-details"><h3>{user.email?.split('@')[0]}</h3><p>{user.email}</p></div><button className="logout-btn" onClick={handleLogout}><i className="fas fa-sign-out-alt"></i></button></div></div>
                    <div className="users-list"><div className="section-title"><i className="fas fa-users"></i> Colleagues ({users.length})</div>{users.map(u=>(<div key={u.uid} className={`user-item ${selectedUser?.uid===u.uid?'active':''}`} onClick={()=>setSelectedUser(u)}><div className="user-avatar-small">{u.displayName?.[0]?.toUpperCase()||'U'}<span className={`online-status ${u.online?'online':'offline'}`}></span></div><div className="user-name">{u.displayName}<div className="user-email">{u.email}</div></div></div>))}</div>
                </div>
                <div className="chat-area">
                    {selectedUser ? (
                        <>
                            <div className="chat-header"><div className="chat-header-info"><div className="user-avatar-small" style={{width:'48px',height:'48px'}}>{selectedUser.displayName?.[0]?.toUpperCase()||'U'}<span className={`online-status ${selectedUser.online?'online':'offline'}`}></span></div><div><h3>{selectedUser.displayName}</h3><div style={{fontSize:'12px',color:'#64748b'}}>{selectedUser.online?'Online':'Offline'}</div></div></div></div>
                            {liveText && <div className="live-preview"><i className="fas fa-pencil-alt"></i><div><div style={{fontWeight:600,fontSize:'12px',color:'#92400e'}}>{selectedUser.displayName} is writing:</div><div style={{fontSize:'14px',color:'#78350f'}}>{liveText}<span style={{display:'inline-block',width:'2px',height:'16px',backgroundColor:'#f59e0b',animation:'blink 1s infinite',marginLeft:'2px',verticalAlign:'middle'}}></span></div></div></div>}
                            <div className="messages-area">{messages.map(msg=>(<div key={msg.id} className={`message ${msg.senderId===user.uid?'sent':'received'}`}><div className="message-bubble">{msg.text}<div className="message-meta">{msg.timestamp?.toDate?.()?.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})||'Just now'}</div></div></div>))}<div ref={messagesEndRef} /></div>
                            <div className="message-input"><div className="input-wrapper"><div className="input-container"><textarea ref={textareaRef} rows="1" placeholder={`Message ${selectedUser.displayName}...`} value={messageText} onChange={e=>handleLiveTyping(e.target.value)} onKeyDown={handleKeyPress} disabled={sending} maxLength="500"/></div><button onClick={sendMessage} disabled={!messageText.trim()||sending}><i className={`fas ${sending?'fa-spinner fa-pulse':'fa-paper-plane'}`}></i></button></div></div>
                        </>
                    ) : (
                        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="empty-chat"><i className="fas fa-comments"></i><h3>Select a colleague to chat</h3><p>See what they're typing in real-time!</p></div></div>
                    )}
                </div>
            </div>
        );
    };
    
    ReactDOM.render(<ChatApp />, document.getElementById('root'));
</script>
</body>
</html>
