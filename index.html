<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Real-time team chat with live typing preview">
    <title>TeamChat - Real-time Messaging for Teams</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDKs (Compatibility version for easier setup) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main App Container */
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        /* Auth Forms */
        .auth-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1e293b;
        }

        .auth-card p {
            color: #64748b;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
        }

        .toggle-auth a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        /* User Profile Header */
        .user-profile {
            padding: 24px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .user-details h3 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #1e293b;
        }

        .user-details p {
            font-size: 12px;
            color: #64748b;
        }

        .logout-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            transition: transform 0.2s;
        }

        .logout-btn:hover {
            transform: scale(1.1);
        }

        /* Users List */
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .user-item:hover {
            background: #f1f5f9;
            transform: translateX(2px);
        }

        .user-item.active {
            background: #eef2ff;
            border-left: 3px solid #667eea;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
        }

        .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid white;
        }

        .online-status.online {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .online-status.offline {
            background: #94a3b8;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .user-name {
            flex: 1;
            font-weight: 500;
            color: #1e293b;
        }

        .user-email {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        /* Chat Header */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }

        /* Live Typing Preview */
        .live-preview {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px 16px;
            margin: 12px 20px 0 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .live-preview i {
            color: #f59e0b;
            font-size: 20px;
        }

        .live-preview-content {
            flex: 1;
        }

        .live-preview-name {
            font-weight: 600;
            font-size: 12px;
            color: #92400e;
            margin-bottom: 4px;
        }

        .live-preview-text {
            font-size: 14px;
            color: #78350f;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 16px;
            background-color: #f59e0b;
            animation: blink 1s infinite;
            margin-left: 2px;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #faf9fe;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        .message {
            display: flex;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }

        .message.sent {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            max-width: 100%;
            position: relative;
        }

        .sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sent .message-meta {
            justify-content: flex-end;
        }

        /* Message Input */
        .message-input {
            padding: 20px 24px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .message-input textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            resize: none;
            max-height: 100px;
            transition: all 0.2s;
        }

        .message-input textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .char-count {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: #94a3b8;
            background: white;
            padding: 2px 6px;
            border-radius: 12px;
        }

        .message-input button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .message-input button:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .message-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-chat {
            text-align: center;
            color: #94a3b8;
            margin-top: 50px;
        }

        .empty-chat i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .auth-card {
                margin: 20px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
<div id="root">
    <div class="loading-spinner">Loading TeamChat...</div>
</div>

<script type="text/babel">
    // ============================================
    // 🔧 IMPORTANT: REPLACE WITH YOUR FIREBASE CONFIG
    // Get it from: https://console.firebase.google.com/project/_/settings/general/
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyD5u0_bPryTrnF7BA5g_2cuE-MN82MW7QI",           // ← Replace with your actual API key
        authDomain: "realtime-chatapp-da275.firebaseapp.com",  // ← Replace with your auth domain
        projectId: "realtime-chatapp-da275",          // ← Replace with your project ID
        storageBucket: "realtime-chatapp-da275.firebasestorage.app",  // ← Replace with your storage bucket
        messagingSenderId: "741973944332",     // ← Replace with your sender ID
        appId: ":741973944332:web:263b94797c9cffefd8a629"     // ← Replace with your app ID
    };
    
    // Check if Firebase is configured
    const isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY_HERE" && 
                                  firebaseConfig.projectId !== "your-project-id";
    
    if (!isFirebaseConfigured) {
        document.getElementById('root').innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: white; padding: 20px;">
                <div style="text-align: center; max-width: 500px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #f59e0b; margin-bottom: 20px;"></i>
                    <h2 style="color: #1e293b; margin-bottom: 10px;">⚠️ Firebase Configuration Required</h2>
                    <p style="color: #64748b; margin-bottom: 20px;">Please replace the firebaseConfig object in the code with your actual Firebase project configuration.</p>
                    <div style="background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 20px;">
                        <strong style="color: #1e293b;">📋 Steps to get your config:</strong>
                        <ol style="margin-top: 10px; margin-left: 20px; color: #475569;">
                            <li>Go to <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a></li>
                            <li>Create a new project or select existing</li>
                            <li>Click the web icon (&lt;/&gt;) to add a web app</li>
                            <li>Copy the firebaseConfig object</li>
                            <li>Paste it in the code above</li>
                            <li>Enable Email/Password authentication</li>
                            <li>Create Firestore database in test mode</li>
                        </ol>
                    </div>
                    <button onclick="location.reload()" class="btn" style="width: auto; padding: 10px 20px;">Refresh After Configuring</button>
                </div>
            </div>
        `;
        throw new Error("Firebase not configured. Please replace the firebaseConfig object.");
    }
    
    // Initialize Firebase
    let app, auth, db;
    try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        
        // Configure Firestore cache (replaces deprecated enablePersistence)
        db.settings({
            cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED
        }).catch(err => console.log("Cache config:", err));
        
        console.log("✅ Firebase initialized successfully");
    } catch (error) {
        console.error("❌ Firebase initialization error:", error);
        document.getElementById('root').innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
                <div style="text-align: center; color: white;">
                    <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <h2>Firebase Error</h2>
                    <p>${error.message}</p>
                </div>
            </div>
        `;
        throw error;
    }
    
    const { useState, useEffect, useRef } = React;
    
    const ChatApp = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [users, setUsers] = useState([]);
        const [selectedUser, setSelectedUser] = useState(null);
        const [messages, setMessages] = useState([]);
        const [messageText, setMessageText] = useState('');
        const [liveText, setLiveText] = useState('');
        const [isAuthMode, setIsAuthMode] = useState('login');
        const [authEmail, setAuthEmail] = useState('');
        const [authPassword, setAuthPassword] = useState('');
        const [authError, setAuthError] = useState('');
        const [authSuccess, setAuthSuccess] = useState('');
        const [sending, setSending] = useState(false);
        const messagesEndRef = useRef(null);
        const textareaRef = useRef(null);
        const typingTimeoutRef = useRef(null);
        
        // Auto-scroll to bottom
        const scrollToBottom = () => {
            messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        };
        
        useEffect(() => {
            scrollToBottom();
        }, [messages]);
        
        // Check auth state
        useEffect(() => {
            const unsubscribe = auth.onAuthStateChanged(async (authUser) => {
                if (authUser) {
                    setUser(authUser);
                    setAuthError('');
                    try {
                        // Create/update user document
                        await db.collection('users').doc(authUser.uid).set({
                            uid: authUser.uid,
                            email: authUser.email,
                            displayName: authUser.email.split('@')[0],
                            online: true,
                            lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        
                        // Set up presence
                        const presenceRef = db.collection('presence').doc(authUser.uid);
                        presenceRef.set({
                            online: true,
                            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        
                        // Update online status on disconnect
                        const onDisconnect = presenceRef.onDisconnect();
                        onDisconnect.set({
                            online: false,
                            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        
                        // Update user online status on window close
                        window.addEventListener('beforeunload', () => {
                            presenceRef.set({ online: false });
                            db.collection('users').doc(authUser.uid).update({ online: false });
                        });
                        
                    } catch (err) {
                        console.error("Error updating user:", err);
                    }
                } else {
                    setUser(null);
                    setSelectedUser(null);
                }
                setLoading(false);
            });
            return () => unsubscribe();
        }, []);
        
        // Load all users
        useEffect(() => {
            if (!user) return;
            
            const unsubscribe = db.collection('users')
                .orderBy('online', 'desc')
                .onSnapshot(snapshot => {
                    const userList = [];
                    snapshot.forEach(doc => {
                        if (doc.id !== user.uid) {
                            userList.push({ uid: doc.id, ...doc.data() });
                        }
                    });
                    setUsers(userList);
                }, (err) => {
                    console.error("Error loading users:", err);
                });
            
            return () => unsubscribe();
        }, [user]);
        
        // Load messages for selected user
        useEffect(() => {
            if (!user || !selectedUser) return;
            
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            const unsubscribe = db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    const msgs = [];
                    snapshot.forEach(doc => {
                        msgs.push({ id: doc.id, ...doc.data() });
                    });
                    setMessages(msgs);
                }, (err) => {
                    console.error("Error loading messages:", err);
                });
            
            return () => unsubscribe();
        }, [user, selectedUser]);
        
        // Listen for live typing from selected user
        useEffect(() => {
            if (!user || !selectedUser) return;
            
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            const liveTextRef = db.collection('liveText').doc(chatId);
            
            const unsubscribe = liveTextRef.onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.userId !== user.uid && data.text && data.text.trim()) {
                        setLiveText(data.text);
                    } else {
                        setLiveText('');
                    }
                } else {
                    setLiveText('');
                }
            });
            
            return () => unsubscribe();
        }, [user, selectedUser]);
        
        // Handle live typing (send to Firestore)
        const handleLiveTyping = (text) => {
            setMessageText(text);
            
            if (typingTimeoutRef.current) {
                clearTimeout(typingTimeoutRef.current);
            }
            
            if (!selectedUser) return;
            
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            const liveTextRef = db.collection('liveText').doc(chatId);
            
            if (text.trim()) {
                liveTextRef.set({
                    userId: user.uid,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                liveTextRef.set({
                    userId: user.uid,
                    text: '',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            typingTimeoutRef.current = setTimeout(() => {
                liveTextRef.set({
                    userId: user.uid,
                    text: '',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }, 2000);
        };
        
        // Send message
        const sendMessage = async () => {
            if (!messageText.trim() || !selectedUser || sending) return;
            
            setSending(true);
            const chatId = [user.uid, selectedUser.uid].sort().join('_');
            
            try {
                await db.collection('chats')
                    .doc(chatId)
                    .collection('messages')
                    .add({
                        text: messageText,
                        senderId: user.uid,
                        receiverId: selectedUser.uid,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        read: false
                    });
                
                // Clear live text
                const liveTextRef = db.collection('liveText').doc(chatId);
                await liveTextRef.set({
                    userId: user.uid,
                    text: '',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                setMessageText('');
                textareaRef.current?.focus();
            } catch (err) {
                console.error("Error sending message:", err);
                setAuthError("Failed to send message: " + err.message);
                setTimeout(() => setAuthError(''), 3000);
            } finally {
                setSending(false);
            }
        };
        
        // Handle authentication
        const handleAuth = async () => {
            setAuthError('');
            setAuthSuccess('');
            
            if (!authEmail || !authPassword) {
                setAuthError("Please enter both email and password");
                return;
            }
            
            try {
                if (isAuthMode === 'login') {
                    await auth.signInWithEmailAndPassword(authEmail, authPassword);
                    setAuthSuccess("Login successful! Welcome back!");
                    setTimeout(() => setAuthSuccess(''), 2000);
                } else {
                    await auth.createUserWithEmailAndPassword(authEmail, authPassword);
                    setAuthSuccess("Account created successfully! Welcome!");
                    setTimeout(() => setAuthSuccess(''), 2000);
                }
            } catch (error) {
                console.error("Auth error:", error);
                let errorMsg = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = "Email already registered. Please sign in instead.";
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = "Password should be at least 6 characters.";
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = "Please enter a valid email address.";
                }
                setAuthError(errorMsg);
            }
        };
        
        // Handle logout
        const handleLogout = async () => {
            if (user) {
                try {
                    await db.collection('users').doc(user.uid).update({
                        online: false,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await db.collection('presence').doc(user.uid).set({
                        online: false,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    console.error("Error updating status:", err);
                }
            }
            await auth.signOut();
            setUser(null);
            setSelectedUser(null);
            setLiveText('');
            setMessages([]);
        };
        
        const handleKeyPress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        if (loading) {
            return (
                <div className="app-container" style={{ justifyContent: 'center', alignItems: 'center' }}>
                    <div className="loading-spinner">
                        <i className="fas fa-spinner fa-pulse" style={{ fontSize: '32px', color: '#667eea' }}></i>
                        <p style={{ marginTop: '12px', color: '#64748b' }}>Loading TeamChat...</p>
                    </div>
                </div>
            );
        }
        
        if (!user) {
            return (
                <div className="app-container">
                    <div className="auth-container">
                        <div className="auth-card">
                            <h2>{isAuthMode === 'login' ? 'Welcome Back!' : 'Create Account'}</h2>
                            <p>{isAuthMode === 'login' ? 'Sign in to chat with colleagues' : 'Join TeamChat and start collaborating'}</p>
                            
                            {authError && <div className="error-message">{authError}</div>}
                            {authSuccess && <div className="success-message">{authSuccess}</div>}
                            
                            <div className="input-group">
                                <label>Email Address</label>
                                <input 
                                    type="email" 
                                    placeholder="colleague@company.com"
                                    value={authEmail}
                                    onChange={(e) => setAuthEmail(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleAuth()}
                                />
                            </div>
                            
                            <div className="input-group">
                                <label>Password</label>
                                <input 
                                    type="password" 
                                    placeholder="•••••••• (min. 6 characters)"
                                    value={authPassword}
                                    onChange={(e) => setAuthPassword(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleAuth()}
                                />
                            </div>
                            
                            <button className="btn" onClick={handleAuth}>
                                {isAuthMode === 'login' ? 'Sign In' : 'Create Account'}
                            </button>
                            
                            <div className="toggle-auth">
                                {isAuthMode === 'login' ? (
                                    <>Don't have an account? <a onClick={() => setIsAuthMode('signup')}>Sign up</a></>
                                ) : (
                                    <>Already have an account? <a onClick={() => setIsAuthMode('login')}>Sign in</a></>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        return (
            <div className="app-container">
                {/* Sidebar - User List */}
                <div className="sidebar">
                    <div className="user-profile">
                        <div className="user-info">
                            <div className="avatar">
                                {user.email?.[0]?.toUpperCase() || 'U'}
                            </div>
                            <div className="user-details">
                                <h3>{user.email?.split('@')[0]}</h3>
                                <p>{user.email}</p>
                            </div>
                            <button className="logout-btn" onClick={handleLogout} title="Logout">
                                <i className="fas fa-sign-out-alt"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div className="users-list">
                        <div className="section-title">
                            <i className="fas fa-users"></i> Colleagues ({users.length})
                        </div>
                        {users.length === 0 ? (
                            <div style={{ textAlign: 'center', color: '#94a3b8', padding: '20px' }}>
                                <i className="fas fa-user-friends" style={{ fontSize: '32px', marginBottom: '10px', opacity: 0.5 }}></i>
                                <p>No colleagues yet</p>
                                <p style={{ fontSize: '12px' }}>Share this app with friends!</p>
                            </div>
                        ) : (
                            users.map(u => (
                                <div 
                                    key={u.uid} 
                                    className={`user-item ${selectedUser?.uid === u.uid ? 'active' : ''}`}
                                    onClick={() => setSelectedUser(u)}
                                >
                                    <div className="user-avatar-small">
                                        {u.displayName?.[0]?.toUpperCase() || 'U'}
                                        <span className={`online-status ${u.online ? 'online' : 'offline'}`}></span>
                                    </div>
                                    <div className="user-name">
                                        {u.displayName}
                                        <div className="user-email">{u.email}</div>
                                    </div>
                                    {u.online && <i className="fas fa-circle" style={{ fontSize: '8px', color: '#10b981' }}></i>}
                                </div>
                            ))
                        )}
                    </div>
                </div>
                
                {/* Chat Area */}
                <div className="chat-area">
                    {selectedUser ? (
                        <>
                            <div className="chat-header">
                                <div className="chat-header-info">
                                    <div className="user-avatar-small" style={{ width: '48px', height: '48px' }}>
                                        {selectedUser.displayName?.[0]?.toUpperCase() || 'U'}
                                        <span className={`online-status ${selectedUser.online ? 'online' : 'offline'}`}></span>
                                    </div>
                                    <div>
                                        <h3>{selectedUser.displayName}</h3>
                                        <div style={{ fontSize: '12px', color: '#64748b' }}>
                                            {selectedUser.online ? (
                                                <><i className="fas fa-circle" style={{ fontSize: '8px', color: '#10b981', marginRight: '4px' }}></i> Online</>
                                            ) : (
                                                <><i className="fas fa-circle" style={{ fontSize: '8px', color: '#94a3b8', marginRight: '4px' }}></i> Offline</>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Live Typing Preview */}
                            {liveText && (
                                <div className="live-preview">
                                    <i className="fas fa-pencil-alt"></i>
                                    <div className="live-preview-content">
                                        <div className="live-preview-name">
                                            {selectedUser.displayName} is writing:
                                        </div>
                                        <div className="live-preview-text">
                                            {liveText}
                                            <span className="cursor-blink"></span>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {/* Messages Area */}
                            <div className="messages-area">
                                {messages.length === 0 ? (
                                    <div className="empty-chat">
                                        <i className="fas fa-comment-dots"></i>
                                        <h3>No messages yet</h3>
                                        <p>Start a conversation with {selectedUser.displayName}</p>
                                    </div>
                                ) : (
                                    messages.map(msg => (
                                        <div key={msg.id} className={`message ${msg.senderId === user.uid ? 'sent' : 'received'}`}>
                                            <div className="message-bubble">
                                                {msg.text}
                                                <div className="message-meta">
                                                    {msg.timestamp?.toDate?.()?.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || 'Just now'}
                                                    {msg.senderId === user.uid && <i className="fas fa-check-double" style={{ fontSize: '10px' }}></i>}
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            
                            {/* Message Input */}
                            <div className="message-input">
                                <div className="input-wrapper">
                                    <div className="input-container">
                                        <textarea
                                            ref={textareaRef}
                                            rows="1"
                                            placeholder={`Message ${selectedUser.displayName}...`}
                                            value={messageText}
                                            onChange={(e) => handleLiveTyping(e.target.value)}
                                            onKeyDown={handleKeyPress}
                                            disabled={sending}
                                            maxLength="500"
                                            style={{ paddingRight: '45px' }}
                                        />
                                        <div className="char-count">
                                            {messageText.length}/500
                                        </div>
                                    </div>
                                    <button 
                                        onClick={sendMessage} 
                                        disabled={!messageText.trim() || sending}
                                    >
                                        <i className={`fas ${sending ? 'fa-spinner fa-pulse' : 'fa-paper-plane'}`}></i>
                                    </button>
                                </div>
                            </div>
                        </>
                    ) : (
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <div className="empty-chat">
                                <i className="fas fa-comments"></i>
                                <h3>Welcome to TeamChat!</h3>
                                <p>Select a colleague from the sidebar to start chatting</p>
                                <p style={{ fontSize: '12px', marginTop: '8px', color: '#f59e0b' }}>
                                    <i className="fas fa-eye"></i> See what they're typing in real-time!
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    };
    
    ReactDOM.render(<ChatApp />, document.getElementById('root'));
</script>
</body>
</html>
